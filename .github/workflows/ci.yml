name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Run formatter
        run: pixi run fmt

      - name: Assert no uncommitted formatting changes
        run: git diff --exit-code

  bench-build:
    name: Benchmark build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Compile benchmarks (no run)
        run: pixi run bench-build

  test:
    name: Test suite (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest -> x86-64 (exercises the AES-NI backend),
        # ubuntu-24.04-arm -> aarch64 (exercises the AES+PMULL backends).
        # Both are free GitHub-hosted runners for public repositories.
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Run tests
        run: pixi run test

