name: Docs

on:
  # TEMPORARY: publish docs on a push to ANY branch. Revert to
  # `push: { branches: [main] }` once docs publishing is finalized.
  push:
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages via the official actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run so a
# deploy always completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    # ubuntu-latest is x86-64, where pymodo's bundled `modo` binary runs.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build documentation site
        # `pixi run docs` runs modo (mojo doc + README pages) then Hugo,
        # producing the static site in docs/site/public.
        run: pixi run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
