# Modo (https://mlange-42.github.io/modo/) configuration for the API docs.
# Build with `pixi run docs`.

# Input files as generated by `mojo doc`, plus any Markdown placed alongside
# them (see the `pre-run` script, which also drops the package README.md files
# in here so they become each package's landing page).
input:
  - docs/src

# Source directories to monitor when running in watch mode.
source:
  - mojo_crypto

# Full URLs of package sources. Used to create source links.
source-url:
  mojo_crypto: https://github.com/Mr-Leshiy/mojo-crypto/blob/main/mojo_crypto

# Output directory (Hugo content root).
output: docs/site/content

# Doc-tests are disabled: running them needs `mojo test` on a GPU host, which
# the docs build must not require.
tests: ""

# Output format. One of (plain|hugo|mdbook).
format: hugo

# Re-structure docs according to package re-exports.
exports: true

# Use shortened cross-ref link labels.
short-links: true

# Report missing docstrings and coverage.
report-missing: true

# Break with error on any warning.
strict: false

# Run without generating any output files.
dry-run: false

# Build for systems that are not case-sensitive regarding file names.
case-insensitive: false

# Directories to scan for templates to overwrite builtin templates.
templates: []

# Bash scripts to run before build as well as test.
pre-run:
  - |
    echo "Generating API JSON with 'mojo doc'..."
    mojo doc -I . -o docs/src/mojo_crypto.json mojo_crypto

    echo "Including package README.md files as Overview pages..."
    # Mirror each package README into the Modo input tree as an "Overview" page
    # within that package's section. A regular page name (not _index.md) avoids
    # colliding with Modo's auto-generated package index, and weight=1 sorts it
    # to the top of the section. The Hugo front matter gives it a clean title.
    find mojo_crypto -name README.md -print0 | while IFS= read -r -d '' readme; do
      dest="docs/src/${readme%/README.md}/overview.md"
      mkdir -p "$(dirname "$dest")"
      {
        printf -- '---\ntitle: Overview\ntype: docs\nweight: 1\n---\n\n'
        cat "$readme"
      } > "$dest"
    done
    echo "Done."

# Bash scripts to run before build.
pre-build: []

# Bash scripts to run before test.
pre-test: []

# Bash scripts to run after build as well as test.
post-run: []
