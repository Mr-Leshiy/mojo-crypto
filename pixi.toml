[workspace]
authors = ["Mr-Leshiy <leshiy12345678@gmail.com>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo-crypto"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"
license = "MIT OR Apache-2.0"

[tasks]
fmt    = "mojo format ."

# --target-features=+aes enables the AES/PMULL crypto instructions used by the
# hardware backends (AES-NI on x86, AES+PMULL on aarch64). It is appended to the
# host features, so the tests exercise the native backend on each runner. We set
# it explicitly because `mojo run`'s host-feature autodetection is unreliable in
# some environments (e.g. restricted CI containers), which would otherwise fail
# instruction selection for PMULL. All target CPUs we run on (x86-64 and aarch64
# GitHub runners, Apple Silicon) have these instructions.
test   = """
mojo run --target-features=+aes -I . tests/block_ciphers/aes/test_aes.mojo &&
mojo run --target-features=+aes -I . tests/containers/encoding/test_hex.mojo &&

mojo run --target-features=+aes -I . tests/universal_hashes/test_field_element.mojo &&
mojo run --target-features=+aes -I . tests/universal_hashes/test_polyval.mojo &&
mojo run --target-features=+aes -I . tests/universal_hashes/test_ghash.mojo
"""

bench  = "python -m benchmarks.cli"
bench-rust = "cargo bench --manifest-path benchmarks/rust/Cargo.toml"

# Compile-only checks for the benchmarks: verify they build without running them
# (running requires a GPU / specific host CPU). `mojo build --emit=asm` runs the
# full backend codegen — so it catches e.g. missing PMULL/AES-NI feature gates —
# but skips the final link, so no C compiler is needed. Output goes to a throwaway
# temp dir that is removed afterwards (the GPU benches emit a sidecar .ptx next to
# the -o path, so /dev/null can't be used for those). The arch-specific benches
# are cross-compiled for both CPU targets (so either an x86 or aarch64 runner
# checks them all) and the GPU benches are AOT-compiled for an NVIDIA target via
# --target-accelerator (no physical GPU needed).
bench-build = { depends-on = ["bench-build-mojo", "bench-build-rust"] }

bench-build-mojo = """
out=$(mktemp -d) &&
mojo build --emit=asm -I . benchmarks/block_ciphers/aes/cpu.mojo -o $out/aes_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/block_ciphers/aes/aarch64.mojo -o $out/aes_aarch64 &&
mojo build --emit=asm --target-triple=x86_64-unknown-linux-gnu --target-features=+aes,+sse2 -I . benchmarks/block_ciphers/aes/x86.mojo -o $out/aes_x86 &&
mojo build --emit=asm --target-accelerator=sm_80 -I . benchmarks/block_ciphers/aes/gpu.mojo -o $out/aes_gpu &&
mojo build --emit=asm -I . benchmarks/universal_hashes/ghash/cpu.mojo -o $out/ghash_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/ghash/aarch64.mojo -o $out/ghash_aarch64 &&
mojo build --emit=asm -I . benchmarks/universal_hashes/polyval/cpu.mojo -o $out/polyval_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/polyval/aarch64.mojo -o $out/polyval_aarch64 &&
mojo build --emit=asm -I . benchmarks/containers/encoding/hex/cpu.mojo -o $out/hex_cpu &&
mojo build --emit=asm --target-accelerator=sm_80 -I . benchmarks/containers/encoding/hex/gpu.mojo -o $out/hex_gpu &&
rm -rf $out
"""

bench-build-rust = "cargo bench --no-run --manifest-path benchmarks/rust/Cargo.toml"

[dependencies]
mojo = ">=1.0.0b1,<2"
rust = ">=1.80.0,<2"

[pypi-dependencies]
typer = ">=0.12"
