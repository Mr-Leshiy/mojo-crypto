[workspace]
authors = ["Mr-Leshiy <leshiy12345678@gmail.com>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo-crypto"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"
license = "MIT OR Apache-2.0"

[tasks]
fmt    = "mojo format ."

test   = """
mojo run -I . tests/block_ciphers/aes/test_aes.mojo &&
mojo run -I . tests/containers/encoding/test_hex.mojo &&

mojo run -I . tests/universal_hashes/test_field_element.mojo &&
mojo run -I . tests/universal_hashes/test_polyval.mojo &&
mojo run -I . tests/universal_hashes/test_ghash.mojo
"""

bench  = "python -m benchmarks.cli"
bench-rust = "cargo bench --manifest-path benchmarks/rust/Cargo.toml"

# Compile-only checks for the benchmarks: verify they build without running them
# (running requires a GPU / specific host CPU). `mojo build --emit=asm` runs the
# full backend codegen — so it catches e.g. missing PMULL/AES-NI feature gates —
# but skips the final link, so no C compiler or executable is produced. The
# arch-specific benches are cross-compiled for both targets so either runner
# (x86 or aarch64) checks them all. GPU benches are excluded (they need a GPU).
bench-build = { depends-on = ["bench-build-mojo", "bench-build-rust"] }

bench-build-mojo = """
mojo build  -I . benchmarks/block_ciphers/aes/cpu.mojo &&
mojo build --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/block_ciphers/aes/aarch64.mojo &&
mojo build --target-triple=x86_64-unknown-linux-gnu --target-features=+aes,+sse2 -I . benchmarks/block_ciphers/aes/x86.mojo &&
mojo build -I . benchmarks/universal_hashes/ghash/cpu.mojo &&
mojo build --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/ghash/aarch64.mojo &&
mojo build -I . benchmarks/universal_hashes/polyval/cpu.mojo &&
mojo build --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/polyval/aarch64.mojo
"""

bench-build-rust = "cargo bench --no-run --manifest-path benchmarks/rust/Cargo.toml"

[dependencies]
mojo = ">=1.0.0b1,<2"
rust = ">=1.80.0,<2"

[pypi-dependencies]
typer = ">=0.12"
