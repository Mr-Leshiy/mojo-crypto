[workspace]
authors = ["Mr-Leshiy <leshiy12345678@gmail.com>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo-crypto"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"
license = "MIT OR Apache-2.0"

[tasks]
fmt    = "mojo format ."

# Build the API documentation site into docs/site/public:
#   1. modo runs `mojo doc`, copies each package README.md in as an Overview
#      page, and emits Hugo content (see modo.yaml). Invoked as `python -m
#      pymodo` (the documented fallback) so it works without depending on the
#      `modo` console script being exposed on PATH.
#   2. `hugo` renders the static HTML site (theme fetched via Hugo Modules).
docs = "python -m pymodo build && hugo --source docs/site"

# $MOJO_TEST_FEATURES lets CI enable the crypto instructions used by the hardware
# backends, so the tests exercise the native backend on each runner. We set it
# explicitly because `mojo run`'s host-feature autodetection is unreliable in some
# environments (e.g. restricted CI containers)
test   = """
mojo run $MOJO_TEST_FEATURES -I . tests/block_ciphers/aes/test_aes.mojo &&
mojo run $MOJO_TEST_FEATURES -I . tests/block_ciphers/test_ctr.mojo &&
mojo run $MOJO_TEST_FEATURES -I . tests/containers/encoding/test_hex.mojo &&

mojo run $MOJO_TEST_FEATURES -I . tests/universal_hashes/test_field_element.mojo &&
mojo run $MOJO_TEST_FEATURES -I . tests/universal_hashes/test_polyval.mojo &&
mojo run $MOJO_TEST_FEATURES -I . tests/universal_hashes/test_ghash.mojo
"""

bench  = "python -m benchmarks.cli"
bench-rust = "cargo bench --manifest-path benchmarks/rust/Cargo.toml"

# Compile-only checks for the benchmarks: verify they build without running them
# (running requires a GPU / specific host CPU).
bench-build = { depends-on = ["bench-build-mojo", "bench-build-rust"] }

bench-build-mojo = """
out=$(mktemp -d) &&
mojo build --emit=asm -I . benchmarks/block_ciphers/aes/cpu.mojo -o $out/aes_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/block_ciphers/aes/aarch64.mojo -o $out/aes_aarch64 &&
mojo build --emit=asm --target-triple=x86_64-unknown-linux-gnu --target-features=+aes,+sse2 -I . benchmarks/block_ciphers/aes/x86.mojo -o $out/aes_x86 &&
mojo build --emit=asm --target-accelerator=sm_80 -I . benchmarks/block_ciphers/aes/gpu.mojo -o $out/aes_gpu &&
mojo build --emit=asm -I . benchmarks/universal_hashes/ghash/cpu.mojo -o $out/ghash_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/ghash/aarch64.mojo -o $out/ghash_aarch64 &&
mojo build --emit=asm --target-triple=x86_64-unknown-linux-gnu --target-features=+pclmul,+sse2 -I . benchmarks/universal_hashes/ghash/x86.mojo -o $out/ghash_x86 &&
mojo build --emit=asm -I . benchmarks/universal_hashes/polyval/cpu.mojo -o $out/polyval_cpu &&
mojo build --emit=asm --target-triple=aarch64-unknown-linux-gnu --target-features=+neon,+aes -I . benchmarks/universal_hashes/polyval/aarch64.mojo -o $out/polyval_aarch64 &&
mojo build --emit=asm --target-triple=x86_64-unknown-linux-gnu --target-features=+pclmul,+sse2 -I . benchmarks/universal_hashes/polyval/x86.mojo -o $out/polyval_x86 &&
mojo build --emit=asm -I . benchmarks/containers/encoding/hex/cpu.mojo -o $out/hex_cpu &&
mojo build --emit=asm --target-accelerator=sm_80 -I . benchmarks/containers/encoding/hex/gpu.mojo -o $out/hex_gpu &&
rm -rf $out
"""

bench-build-rust = "cargo bench --no-run --manifest-path benchmarks/rust/Cargo.toml"

[dependencies]
mojo = ">=1.0.0b1,<2"
rust = ">=1.80.0,<2"
hugo = ">=0.163.3,<0.164"
go = ">=1.26.4,<2"

[pypi-dependencies]
typer = ">=0.12"
pymodo = ">=0.11.13, <0.12"
